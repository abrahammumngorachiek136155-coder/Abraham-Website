<!DOCTYPE html>
<html>
<head>
<title>student city table</title>
<style>
    table,th,td{
        border: 1px solid black; /*adds a visible border to the table, headers,and data cells*/
        border_collapse: collapse; /*merges the borders into a single border */
        padding: 10px; /*adds space around the cell content */
    }
    th {
        text_align: left; /*aligns header text to the left */
    }
    </style>
    </head>
    <body>
        <h2>student iformation</h2>
        <table>
            <tr>
            <th>student name</th>
            <th>city</th>
            </tr>
            <tr>
                <td>Abraham Doe</td>
                <td>New York</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>Los Angeles</td>
            </tr>
            <tr>
                <td>Michael Johnson</td>
                <td>Chicago</td>
            </tr>
            </table>
        </head>
        </html>
