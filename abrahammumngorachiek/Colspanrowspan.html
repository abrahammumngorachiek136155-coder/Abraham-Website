<!DOCTYPE html>
<html>
<head>
    <title>Colspan and Rowspan Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 30px auto;
            text-align: center;
            background-color: #f9f9f9;
        }
        th, td {
            border: 2px solid black;
            padding: 10px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        td {
            background-color: #e6f2ff;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Table with Colspan and Rowspan</h2>

<table>
    <tr>
        <th>Column 1</th>
        <th>Column 2</th>
        <th>Column 3</th>
    </tr>
    
    <tr>
        <td rowspan="3">Row 1 Cell 1</td>
        <td>Row 1 Cell 2</td>
        <td>Row 1 Cell 3</td>
    </tr>
    
    <tr>
        <td>Row 2 Cell 2</td>
        <td>Row 2 Cell 3</td>
    </tr>
    
    <tr>
        <td colspan="2">Row 3 Cell 1</td>
    </tr>

</table>

</body>
</html>
