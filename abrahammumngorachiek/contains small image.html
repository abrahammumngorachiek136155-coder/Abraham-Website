<!DOCTYPE html>
<html>
<head>
    <title>Table with Thumbnails</title>
    <style>
        table {
            border-collapse: collapse;
            margin: 30px auto;
        }
        td {
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }
        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">4x2 Table with Thumbnails</h2>

<table>
    <tr>
        <td><img src="https://via.placeholder.com/80" alt="Image 1"></td>
        <td><img src="https://via.placeholder.com/80" alt="Image 2"></td>
    </tr>
    <tr>
        <td><img src="https://via.placeholder.com/80" alt="Image 3"></td>
        <td><img src="https://via.placeholder.com/80" alt="Image 4"></td>
    </tr>
    <tr>
        <td><img src="https://via.placeholder.com/80" alt="Image 5"></td>
        <td><img src="https://via.placeholder.com/80" alt="Image 6"></td>
    </tr>
    <tr>
        <td><img src="https://via.placeholder.com/80" alt="Image 7"></td>
        <td><img src="https://via.placeholder.com/80" alt="Image 8"></td>
    </tr>
</table>

</body>
</html>
