<!DOCTYPE html>
<html lang="en">
    <body>
<p style="border: 1px solid block">Hello world</p>
<div style="border: 1px solid block">Hello world</div>
<p the p and the Div elements are both block elements, and they will always start on a new line and take up the full width available(stretch out to the left and right as it can).</p>
<span style="border: 1px solid block">Hello world</span>
<p the span element is an inline element, and it will not start on a new line and only take up as much width as necessary.</p>
    </body>
</html>
