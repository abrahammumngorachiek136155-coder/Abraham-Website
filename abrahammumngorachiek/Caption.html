<!DOCTYPE html>
<html>
<head>
    <title>Table with Caption</title>
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin: 30px auto;
            text-align: center;
        }
        th, td {
            border: 2px solid black;
            padding: 10px;
        }
        caption {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<table>
    <caption>This is a caption</caption>
    
    <tr>
        <td>Row 5, Column 6</td>
        <td>Row 5, Column 7</td>
    </tr>
    
    <tr>
        <td>Row 6, Column 7</td>
        <td>Row 6, Column 8</td>
    </tr>

</table>

</body>
</html>
