<!DOCTYPE html>
<html>
<head>
    <title>Table with Background Image</title>
    <style>
        table {
            border-collapse: collapse;
            width: 60%;
            margin: 30px auto;
            text-align: center;
            background-image: url('https://via.placeholder.com/600x300'); /* Background Image */
            background-size: cover;
            color: white;
        }
        th, td {
            border: 2px solid white;
            padding: 12px;
        }
        th {
            background-color: rgba(0, 0, 0, 0.10);
        }
        td {
            background-color: rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">Table with Background Image</h2>

<table>
    <tr>
        <th>Name</th>
        <th>Course</th>
        <th>Marks</th>
    </tr>
    <tr>
        <td>Abraham MUM</td>
        <td>HTML</td>
        <td>85</td>
    </tr>
    <tr>
        <td>Makur Dominic</td>
        <td>CSS</td>
        <td>90</td>
    </tr>
    <tr>
        <td>Piath Dominic</td>
        <td>JavaScript</td>
        <td>88</td>
    </tr>
</table>

</body>
</html>
