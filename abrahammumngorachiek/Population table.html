<!DOCTYPE html>
<html>
<head>
    <title>Population Growth Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 70%;
            margin: 30px auto;
            text-align: center;
        }
        th, td {
            border: 2px solid black;
            padding: 10px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }
        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<table>
    <caption>Population Growth (in Billion)</caption>
    <tr>
        <th>Country/City</th>
        <th>2020</th>
        <th>2021</th>
        <th>2022</th>
    </tr>
    <tr>
        <td>Canada</td>
        <td>1.3</td>
        <td>1.5</td>
        <td>1.8</td>
    </tr>
    <tr>
        <td>London</td>
        <td>0.09</td>
        <td>0.45</td>
        <td>1.1</td>
    </tr>
    <tr>
        <td>Australia</td>
        <td>1.9</td>
        <td>2.2</td>
        <td>2.4</td>
    </tr>
    <tr>
        <td>India</td>
        <td>2.44</td>
        <td>3.21</td>
        <td>3.62</td>
    </tr>
</table>

</body>
</html>
