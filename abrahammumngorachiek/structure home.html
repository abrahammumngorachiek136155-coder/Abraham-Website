<!DOCTYPE html>
<html>
<head>
    <title>Table Structure Layout</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 30px auto;
            text-align: center;
        }
        td {
            border: 2px solid black;
            padding: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">House Layout Table</h2>

<table>

    <!-- Row 1 -->
    <tr>
        <td rowspan="2">In Entry</td>
        <td>Parking</td>
        <td>Gym</td>
        <td>Library Room</td>
    </tr>

    <!-- Row 2 -->
    <tr>
        <td colspan="3">Home</td>
    </tr>

    <!-- Row 3 -->
    <tr>
        <td>Balcony</td>
        <td>Computer Room</td>
        <td>Drawing Room</td>
        <td rowspan="2">Music Room</td>
    </tr>

    <!-- Row 4 -->
    <tr>
        <td>Dance Floor</td>
        <td>Dining Area</td>
        <td>Kitchen</td>
    </tr>

    <!-- Row 5 -->
    <tr>
        <td>Bedroom</td>
        <td>Play Room</td>
        <td>Master Bedroom</td>
        <td rowspan="2">Wash Area</td>
    </tr>

    <!-- Row 6 -->
    <tr>
        <td colspan="2">Store Room</td>
        <td>Exit Out</td>
    </tr>

</table>

</body>
</html>
